apiVersion: v1
kind: Pod
metadata:
  name: cuda-devbox
spec:
  restartPolicy: Never
  containers:
    - name: dev
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      command: ["bash", "-lc", "sleep infinity"]
      resources:
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: work
          mountPath: /workspace
  volumes:
    - name: work
      persistentVolumeClaim:
        claimName: cuda-workspace-pvc
